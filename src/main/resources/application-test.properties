spring.application.name=petner-application-test
spring.config.import=

# ---------- RDB: H2 ----------
spring.datasource.url=jdbc:h2:mem:petner;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console 활성화 (테스트 환경에서만)
spring.h2.console.enabled=true

# Flyway 비활성화 (테스트에서는 JPA DDL 사용)
spring.flyway.enabled=false

# JPA DDL
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ---------- Redis: 테스트용 비활성화 ----------
spring.cache.type=simple
spring.session.store-type=none

# ---------- Security ----------
spring.security.user.name=test
spring.security.user.password=test

# ---------- DevTools ----------
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# ---------- Logging ----------
logging.level.root=INFO
logging.level.com.example.petner=DEBUG
logging.level.org.springframework.test=DEBUG
logging.level.org.springframework.data.redis=WARN
logging.level.org.springframework.context.support=DEBUG

# ---------- Kakao OAuth (Test) ----------
kakao.oauth.client-id=test-client-id
kakao.oauth.client-secret=test-client-secret
kakao.oauth.redirect-uri=http://localhost:8080/api/v1/auth/kakao/callback

# ---------- Cookie settings (Test) ----------
cookie.secure=false

# ---------- JWT (Test) ----------
jwt.secret=test-secret-key-for-testing-purposes-only
jwt.access-expiration=86400000
jwt.refresh-expiration=604800000

# ---------- GCS (Test) ----------
spring.cloud.gcp.storage.enabled=false
spring.cloud.gcp.project-id=test-project

# ---------- OpenSearch (Test) ----------
opensearch.enabled=false
opensearch.host=localhost
opensearch.port=9200
opensearch.scheme=http
opensearch.username=
opensearch.password=