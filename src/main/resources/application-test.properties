spring.application.name=petner-application-test
spring.config.import=

# ---------- RDB: H2 ----------
spring.datasource.url=jdbc:h2:mem:petner;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console 활성화 (테스트 환경에서만)
spring.h2.console.enabled=true

# JPA DDL
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ---------- Redis: 테스트용 비활성화 ----------
spring.cache.type=simple
spring.session.store-type=none

# ---------- Security ----------
spring.security.user.name=test
spring.security.user.password=test

# ---------- DevTools ----------
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# ---------- Logging ----------
logging.level.root=WARN
logging.level.com.example.petner=INFO
logging.level.org.springframework.test=INFO
logging.level.org.springframework.data.redis=WARN