# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME}

# Redis - Cache
spring.cache.type=${SPRING_CACHE_TYPE}
spring.data.redis.host=${SPRING_REDIS_CACHE_HOST}
spring.data.redis.port=${SPRING_REDIS_CACHE_PORT}

# Redis - Session
spring.session.store-type=${SPRING_SESSION_STORE_TYPE}
spring.session.redis.host=${SPRING_REDIS_SESSION_HOST}
spring.session.redis.port=${SPRING_REDIS_SESSION_PORT}
spring.session.redis.namespace=${SPRING_SESSION_REDIS_NAMESPACE}

# JPA
# spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_HIBERNATE_FORMAT_SQL}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_HIBERNATE_DIALECT}

# JPA naming strategy - camelCase 그대로 사용
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

# Flyway 기능 활성화
spring.flyway.enabled=true
# 마이그레이션 SQL 스크립트가 있는 위치 지정 (기본값)
spring.flyway.locations=classpath:db/migration
# 기존 스키마가 있을 때 baseline 생성
spring.flyway.baseline-on-migrate=true
# 스키마를 완전히 초기화 (개발환경에서만 사용) - 이제 비활성화(true의 경우, 서버 시작때마다 스키마 초기화)
spring.flyway.clean-disabled=true
# validation 체크 활성화 - 안전한 운영을 위해(true의 경우, 서버 시작때마다 스키마 초기화)
spring.flyway.validate-on-migrate=true

# Security Configuration
spring.security.user.name=${SPRING_SECURITY_USER_NAME}
spring.security.user.password=${SPRING_SECURITY_USER_PASSWORD}

# JWT (미래 사용을 위한 설정)
jwt.secret=${JWT_SECRET}
jwt.access-expiration=${JWT_ACCESS_EXPIRATION}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION}

# DevTools - 개발 환경에서만 사용
spring.devtools.restart.enabled=${SPRING_DEVTOOLS_RESTART_ENABLED}
spring.devtools.livereload.enabled=${SPRING_DEVTOOLS_LIVERELOAD_ENABLED}

# Logging
logging.level.root=${LOGGING_LEVEL_ROOT}
logging.level.com.example.petner=${LOGGING_LEVEL_PETNER}
logging.level.org.springframework.security=${LOGGING_LEVEL_SECURITY}

# Cookie settings for development (HTTP)
cookie.secure=${COOKIE_SECURE}