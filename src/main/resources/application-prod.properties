# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME}

# Redis - Cache
spring.cache.type=${SPRING_CACHE_TYPE}
spring.data.redis.host=${SPRING_REDIS_CACHE_HOST}
spring.data.redis.port=${SPRING_REDIS_CACHE_PORT}

# Redis - Session
spring.session.store-type=${SPRING_SESSION_STORE_TYPE}
spring.session.redis.namespace=${SPRING_SESSION_REDIS_NAMESPACE}

# JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_HIBERNATE_FORMAT_SQL}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Security Configuration
spring.security.user.name=${SPRING_SECURITY_USER_NAME}
spring.security.user.password=${SPRING_SECURITY_USER_PASSWORD}

# DevTools ?? - ?? ????? ????
spring.devtools.restart.enabled=${SPRING_DEVTOOLS_RESTART_ENABLED:false}
spring.devtools.livereload.enabled=${SPRING_DEVTOOLS_LIVERELOAD_ENABLED:false}

# ?? ?? ?? (?? ?? ??)
logging.level.root=${LOGGING_LEVEL_ROOT:WARN}
logging.level.com.example.petner=${LOGGING_LEVEL_PETNER:INFO}

# Cookie settings for production (HTTPS)
cookie.secure=${COOKIE_SECURE:true}